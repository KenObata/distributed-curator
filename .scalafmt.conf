version = 3.8.6
runner.dialect = scala212

# ── Line width ────────────────────────────────────────────────────────────────
maxColumn = 120

# ── Indentation ───────────────────────────────────────────────────────────────
indent.main = 2
indent.callSite = 2
indent.defnSite = 2

# ── Alignment ─────────────────────────────────────────────────────────────────
align.preset = more
align.openParenCallSite = false
align.openParenDefnSite = false

# ── Newlines ──────────────────────────────────────────────────────────────────
newlines.topLevelStatementBlankLines = [
  { blanks = 1 }
]
# fold: if line fits on one line, keep it on one line.
newlines.beforeMultiline = fold 

# ── Rewrites ──────────────────────────────────────────────────────────────────
rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  SortModifiers,
  PreferCurlyFors,
  SortImports
]

rewrite.redundantBraces.stringInterpolation = true

# ── Docstrings ────────────────────────────────────────────────────────────────
docstrings.style = Asterisk
docstrings.oneline = fold

# ── Project ───────────────────────────────────────────────────────────────────
project.includeFilters = [".*\\.scala"]
project.excludeFilters = [
  ".scala-build/.*",
  "target/.*"
]